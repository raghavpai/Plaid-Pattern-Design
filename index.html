<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaid Pattern Designer</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    canvas {
      border: 1px solid #ccc;
      margin-top: 20px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 400px;
    }
    .color-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .color-row input[type='number'] {
      width: 60px;
    }
  </style>
</head>
<body>
  <h1>Graphical Plaid Pattern Designer</h1>
  <div class="controls">
    <div id="horizontalColors">
      <h3>Horizontal (Warp) Stripes</h3>
      <div class="color-row">
        <input type="color" value="#ff0000">
        <input type="number" value="20"> px
        <button onclick="removeRow(this)">✕</button>
      </div>
    </div>
    <button onclick="addRow('horizontalColors')">Add Horizontal Stripe</button>

    <div id="verticalColors">
      <h3>Vertical (Weft) Stripes</h3>
      <div class="color-row">
        <input type="color" value="#0000ff">
        <input type="number" value="20"> px
        <button onclick="removeRow(this)">✕</button>
      </div>
    </div>
    <button onclick="addRow('verticalColors')">Add Vertical Stripe</button>

    <button onclick="drawPlaid()">Draw Plaid</button>
    <button onclick="generateRandomStripes()">Randomize Stripes</button>
    <button onclick="downloadPattern()">Download Pattern</button>
  </div>

  <canvas id="plaidCanvas" width="400" height="400"></canvas>

  <script>
    function addRow(sectionId, color = '#000000', width = 20) {
      const section = document.getElementById(sectionId);
      const div = document.createElement('div');
      div.className = 'color-row';
      div.innerHTML = `
        <input type="color" value="${color}">
        <input type="number" value="${width}"> px
        <button onclick="removeRow(this)">✕</button>
      `;
      section.appendChild(div);
    }

    function removeRow(button) {
      button.parentElement.remove();
    }

    function getStripeData(sectionId) {
      const rows = document.getElementById(sectionId).querySelectorAll('.color-row');
      return Array.from(rows).map(row => {
        const color = row.querySelector('input[type=color]').value;
        const width = parseInt(row.querySelector('input[type=number]').value);
        return { color, width };
      });
    }

    function clearSection(sectionId) {
      const section = document.getElementById(sectionId);
      const rows = section.querySelectorAll('.color-row');
      rows.forEach(row => row.remove());
    }

    function drawPlaid() {
      const canvas = document.getElementById("plaidCanvas");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;

      const horizontalStripes = getStripeData('horizontalColors');
      const verticalStripes = getStripeData('verticalColors');

      ctx.clearRect(0, 0, width, height);

      let y = 0;
      while (y < height) {
        for (const { color, width: hWidth } of horizontalStripes) {
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.5;
          ctx.fillRect(0, y, canvas.width, hWidth);
          y += hWidth;
        }
      }

      let x = 0;
      while (x < width) {
        for (const { color, width: vWidth } of verticalStripes) {
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.5;
          ctx.fillRect(x, 0, vWidth, canvas.height);
          x += vWidth;
        }
      }

      ctx.globalAlpha = 1.0;
    }

    function generateRandomColor() {
      return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
    }

    function generateRandomStripes() {
      clearSection('horizontalColors');
      clearSection('verticalColors');

      const hCount = Math.floor(Math.random() * 5) + 2;
      const vCount = Math.floor(Math.random() * 5) + 2;

      for (let i = 0; i < hCount; i++) {
        addRow('horizontalColors', generateRandomColor(), Math.floor(Math.random() * 40) + 10);
      }

      for (let i = 0; i < vCount; i++) {
        addRow('verticalColors', generateRandomColor(), Math.floor(Math.random() * 40) + 10);
      }

      drawPlaid();
    }

    function downloadPattern() {
      const canvas = document.getElementById("plaidCanvas");
      const link = document.createElement('a');
      link.download = 'plaid-pattern.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    drawPlaid(); // Initial draw
  </script>
</body>
</html>
